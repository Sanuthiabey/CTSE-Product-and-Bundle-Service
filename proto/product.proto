syntax = "proto3";

package product;

option go_package = "github.com/Sanuthiabey/CTSE-Product-and-Bundle-Service/proto";

service ProductService {
  rpc GetProduct (GetProductRequest) returns (ProductResponse);
  rpc ValidateBundle (BundleRequest) returns (ValidateResponse);
  rpc DeductBundle (BundleRequest) returns (DeductResponse);
  rpc ValidateStock (ValidateStockRequest) returns (ValidateStockResponse);
  rpc ReduceStock (ReduceStockRequest) returns (ReduceStockResponse);
}

message GetProductRequest {
  string product_id = 1;
}

message ProductResponse {
  string id = 1;
  string name = 2;
  double price = 3;
  string mood_tag = 4;
  int32 stock = 5;
  bool available = 6;
}

message BundleRequest {
  string bundle_id = 1;
}

message ValidateResponse {
  bool valid = 1;
  string message = 2;
}

message DeductResponse {
  bool success = 1;
  string message = 2;
}

message StockItem {
  string product_id = 1;
  int32 quantity = 2;
}

message ValidateStockRequest {
  repeated StockItem items = 1;
}

message UnavailableItem {
  string product_id = 1;
  string reason = 2;
}

message ValidateStockResponse {
  bool all_available = 1;
  repeated UnavailableItem unavailable_items = 2;
}

message ReduceStockRequest {
  string order_id = 1;
  repeated StockItem items = 2;
}

message ReduceStockResponse {
  bool success = 1;
  string message = 2;
}
