services:
  postgres:
    image: postgres:15
    container_name: product-postgres
    environment:
      POSTGRES_USER: productuser
      POSTGRES_PASSWORD: productpass
      POSTGRES_DB: productdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U productuser -d productdb" ]
      interval: 5s
      timeout: 5s
      retries: 5

  product-service:
    build: .
    container_name: product-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: productuser
      DB_PASSWORD: productpass
      DB_NAME: productdb
    ports:
      - "8080:8080"

volumes:
  pgdata: